name: Update League Data

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Fantrax data
        env:
          FANTRAX_SESSION: ${{ secrets.FANTRAX_SESSION }}
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update: League data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
